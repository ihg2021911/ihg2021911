<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Replacement Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        #game {
            text-align: center;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: white;
        }
        #numberInput {
            padding: 10px;
            font-size: 16px;
        }
        #submitBtn {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>Number Replacement Game</h1>
        <input type="number" id="numberInput" placeholder="Enter a number (1-10)" />
        <button id="submitBtn">Submit</button>
        <div id="result"></div>
    </div>
    <script>
        document.getElementById('submitBtn').addEventListener('click', function() {
            const input = document.getElementById('numberInput').value;
            const resultDiv = document.getElementById('result');
            const number = parseInt(input);

            if (number >= 1 && number <= 10) {
                resultDiv.innerHTML = `You entered: ${number}`;
            } else {
                resultDiv.innerHTML = 'Please enter a number between 1 and 10.';
            }
        });
    </script>
</body>
</html>
